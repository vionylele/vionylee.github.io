<html>
    <head>
        <style>
            body {
                background-color: black;
            }

            .sun {
                width: 100px;
                height: 100px;
                background-color: yellow;
                border: 1px solid yellow;
                border-radius: 50%;
                position: absolute;
                top: 450px;
                left: 450px;
                box-shadow: 0 0 20px white;
            }

            .earth {
                width: 400px;
                height: 400px;
                border-width: 1px;
                border-style: solid;
                border-color: white transparent transparent transparent;
                border-radius: 100%;
                position: absolute;
                top: 300px;
                left: 300px;
                animation: orbit 5s linear infinite;
            }
            
            .earth::before {
                content: '';
                position: absolute;
                top: 50px;
                left: 320px;
                background-color: aqua;
                border-radius: 50%;
                width: 60px;
                height: 60px;
                box-shadow: 0 0 10px aquamarine;
            }

            .moon {
                width: 150px;
                height: 150px;
                border-width: 1px;
                border-style: solid;
                border-color: white transparent transparent transparent;
                border-radius: 100%;
                position: absolute;
                top: 0px;
                left: 270px;
                animation: orbit 5s linear infinite;
            }
            
            .moon::before {
                content: '';
                position: absolute;
                top: 10px;
                left: 110px;
                background-color: wheat;
                border-radius: 50%;
                width: 30px;
                height: 30px;
                box-shadow: 0 0 10px silver;
            }

            @keyframes orbit {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div class="sun"></div>
        <div class="earth">
          <div class="moon"></div>
        </div>
    </body>
</html>
